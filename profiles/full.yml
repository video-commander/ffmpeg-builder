name: full

ffmpeg:
  version: 7.1
  enable_ffplay: false
  gpl: true
  nonfree: true          # enables --enable-nonfree in your builder
  ld_static: true

codecs:
  x264:   true
  x265:   true
  aom:    true
  svtav1: true
  vpx:    true
  opus:   true
  fdk_aac: true          # nonfree
  ass:    true
  vmaf:   true
  srt:    true

system:
  parallel: 8

ports:
  x264:
    version: "stable"
  x265:
    version: "3.6"
  aom:
    version: "v3.9.0"
  svtav1:
    version: "v2.2.1"
  vpx:
    version: "v1.14.1"
  opus:
    version: "v1.5.1"
  srt:
    version: "v1.5.4"
  vmaf:
    version: "v3.0.0"
  libass:
    version: "0.17.3"
  fdk_aac:
    version: "v2.0.3"
