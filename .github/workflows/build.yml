name: build-ffmpeg

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Path to build profile
        required: false
        default: profiles/default.yml
        type: string
      ffmpeg_version:
        description: Override FFmpeg version (optional)
        required: false
        default: ""
        type: string
      nonfree:
        description: Enable nonfree (requires nonfree libs configured)
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.os }} • ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: ubuntu-22.04
          #   arch: x86_64
          #   runner: ubuntu-22.04
          - os: macos-14
            arch: arm64
            runner: macos-14
          # - os: macos-13
          #   arch: x86_64
          #   runner: macos-13
          # - os: windows-2022
          #   arch: x86_64
          #   runner: windows-2022

    runs-on: ${{ matrix.runner }}

    env:
      # Use workflow_dispatch inputs when present, otherwise fall back to defaults
      PROFILE: >-
        ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'profiles/default.yml' }}
      FFMPEG_VERSION: >-
        ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ffmpeg_version || '' }}
      ENABLE_NONFREE: >-
        ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nonfree || false }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      BUILD_CACHE: ${{ github.workspace }}/.build-cache

    steps:
      - uses: actions/checkout@v4

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CCACHE_DIR }}
            ${{ env.BUILD_CACHE }}
          # Cache key based on OS/arch + all profiles
          key: ${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('profiles/**/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-

      - name: Bootstrap toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./scripts/bootstrap-linux.sh
          else
            ./scripts/bootstrap-macos.sh
          fi

      - name: Bootstrap toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/bootstrap-windows.ps1

      - name: Build FFmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/build-ffmpeg.sh

      - name: Build FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-ffmpeg.ps1

      - name: Package artifacts (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/package.sh

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.os }}-${{ matrix.arch }}${{ env.ENABLE_NONFREE == 'true' && '-nonfree' || '' }}
          path: dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/**.zip
          generate_release_notes: true